<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Jardin IA 🌿</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a1a0e; font-family: sans-serif; color: #d4e8cc; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a1a0e; }
    ::-webkit-scrollbar-thumb { background: #2D6A4F; border-radius: 2px; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .spin { animation: spin 2s linear infinite; display:inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

const { useState, useEffect } = React;

const SEASONS = {
  printemps: { emoji: "🌸", months: [3,4,5] },
  ete: { emoji: "☀️", months: [6,7,8] },
  automne: { emoji: "🍂", months: [9,10,11] },
  hiver: { emoji: "❄️", months: [12,1,2] },
};

const getSeason = () => {
  const m = new Date().getMonth() + 1;
  if ([3,4,5].includes(m)) return "printemps";
  if ([6,7,8].includes(m)) return "ete";
  if ([9,10,11].includes(m)) return "automne";
  return "hiver";
};

const MOON = ["🌑 Nouvelle Lune","🌒 Premier Croissant","🌓 Premier Quartier","🌔 Gibbeuse Croissante","🌕 Pleine Lune","🌖 Gibbeuse Décroissante","🌗 Dernier Quartier","🌘 Dernier Croissant"];

const PRESETS = [
  { name:"Tomate", emoji:"🍅", type:"potager", watering:2, light:"Plein soleil", npk:"5-10-10", seeds:"Août-Sept", lunar:"Fruit", latinName:"Solanum lycopersicum", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Basilic", emoji:"🌿", type:"aromatique", watering:3, light:"Soleil", npk:"3-3-3", seeds:"Avant floraison", lunar:"Feuille", latinName:"Ocimum basilicum", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Rose", emoji:"🌹", type:"ornement", watering:2, light:"Plein soleil", npk:"6-12-6", seeds:"Bouture", lunar:"Fleur", latinName:"Rosa", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Lavande", emoji:"💜", type:"aromatique", watering:1, light:"Plein soleil", npk:"2-4-4", seeds:"Printemps", lunar:"Feuille", latinName:"Lavandula angustifolia", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Laitue", emoji:"🥬", type:"potager", watering:3, light:"Mi-ombre", npk:"8-4-4", seeds:"Couper feuilles", lunar:"Feuille", latinName:"Lactuca sativa", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Courgette", emoji:"🥒", type:"potager", watering:3, light:"Plein soleil", npk:"5-8-10", seeds:"Juillet", lunar:"Fruit", latinName:"Cucurbita pepo", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Fraisier", emoji:"🍓", type:"fruitier", watering:2, light:"Plein soleil", npk:"5-8-10", seeds:"Stolons automne", lunar:"Fruit", latinName:"Fragaria ananassa", variety:"", plantedDate:"", location:"", notes:"" },
  { name:"Orchidée", emoji:"🌸", type:"intérieur", watering:1, light:"Lumière filtrée", npk:"20-20-20", seeds:"N/A", lunar:"Fleur", latinName:"Phalaenopsis", variety:"", plantedDate:"", location:"", notes:"" },
];

const MALADIES = {
  "Mildiou": { cause:"Humidité excessive", traitement:"Bouillie bordelaise, bicarbonate + savon noir", prevention:"Aérer, arroser à la base" },
  "Oïdium": { cause:"Air chaud et sec", traitement:"Soufre, lait dilué 1:9", prevention:"Espacement, bon soleil" },
  "Botrytis": { cause:"Botrytis cinerea", traitement:"Supprimer parties atteintes, prêle", prevention:"Réduire humidité" },
  "Cochenilles": { cause:"Insecte suceur", traitement:"Alcool 70°, savon noir, huile neem", prevention:"Inspecter régulièrement" },
  "Oïdium des roses": { cause:"Champignon", traitement:"Soufre, bicarbonate de soude", prevention:"Bonne aération" },
  "Pourriture racines": { cause:"Arrosage excessif", traitement:"Rempoter, couper racines noires", prevention:"Sol drainant" },
};

const LUNAR = [
  { jour:"Racine", icon:"🪱", desc:"Récolter tubercules, tailler.", color:"#8B5E3C" },
  { jour:"Feuille", icon:"🍃", desc:"Semer légumes-feuilles, arroser.", color:"#2D6A4F" },
  { jour:"Fleur", icon:"🌸", desc:"Semer fleurs, tailler rosiers.", color:"#D4838F" },
  { jour:"Fruit", icon:"🍓", desc:"Récolter fruits, conserver semences.", color:"#C9473B" },
];

const NPK = [
  { titre:"Azote (N) élevé", plantes:"Légumes-feuilles, gazon", naturel:"Purin d'ortie, marc de café", color:"#2D6A4F" },
  { titre:"Phosphore (P) élevé", plantes:"Bulbes, floraison", naturel:"Cendres de bois, guano", color:"#6B3FA0" },
  { titre:"Potassium (K) élevé", plantes:"Fruits, résistance", naturel:"Cendres, algues, banane séchée", color:"#C9473B" },
];

const inp = { width:"100%", background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"9px 12px", color:"#fff", fontSize:14, outline:"none", fontFamily:"inherit" };

function callAI(prompt, onResult) {
  fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
  }).then(r=>r.json()).then(d=>onResult(d.content?.[0]?.text||"Erreur.")).catch(()=>onResult("Erreur réseau."));
}

function Spinner() {
  return React.createElement("div", {style:{textAlign:"center",padding:32,color:"#a8c5a0"}},
    React.createElement("div", {className:"spin", style:{fontSize:28}}, "🌱"),
    React.createElement("div", {style:{marginTop:10,fontSize:13}}, "Génération en cours…")
  );
}

function AIText({ prompt, deps }) {
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    setLoading(true); setText("");
    callAI(prompt, t => { setText(t); setLoading(false); });
  }, deps || []);
  if (loading) return React.createElement(Spinner);
  return React.createElement("div", {style:{color:"#d4e8cc",lineHeight:1.8,fontSize:14,whiteSpace:"pre-wrap"}}, text);
}

function Modal({ onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"12px 14px 40px",overflowY:"auto"}}>
      <div style={{background:"#1a2e1e",border:"1px solid rgba(168,197,160,0.2)",borderRadius:20,padding:22,maxWidth:480,width:"100%",marginTop:6}}>
        {children}
        <button onClick={onClose} style={{marginTop:16,width:"100%",padding:11,background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontSize:14}}>Fermer</button>
      </div>
    </div>
  );
}

function FichePlante({ plant, season, onClose }) {
  const extra = [plant.latinName&&`Nom latin: ${plant.latinName}`, plant.variety&&`Variété: ${plant.variety}`, plant.plantedDate&&`Plantée le: ${plant.plantedDate}`, plant.location&&`Emplacement: ${plant.location}`, plant.notes&&`Notes: ${plant.notes}`].filter(Boolean).join("\n");
  const prompt = `Expert jardinier. Fiche de soins pour ${plant.name}${extra?"\n"+extra:""}. Saison: ${season}.\n1. 🌿 Description\n2. 💧 Arrosage (${season})\n3. 🌞 Lumière\n4. 🪴 Sol\n5. ✂️ Taille\n6. 🚨 Maladies\n7. 💡 Conseil personnalisé\nMax 250 mots, français, chaleureux.`;
  return (
    <Modal onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <span style={{fontSize:32}}>{plant.emoji}</span>
          <h2 style={{color:"#f0ece0",margin:"4px 0 2px",fontSize:19}}>{plant.name}</h2>
          {plant.latinName && <div style={{color:"#6b9a7a",fontSize:12,fontStyle:"italic"}}>{plant.latinName}</div>}
          {plant.variety && <div style={{color:"#a8c5a0",fontSize:12}}>Variété: {plant.variety}</div>}
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        {plant.plantedDate && <span style={{background:"rgba(255,200,0,0.15)",color:"#ffd700",borderRadius:20,padding:"3px 10px",fontSize:11}}>📅 {plant.plantedDate}</span>}
        {plant.location && <span style={{background:"rgba(45,106,79,0.3)",color:"#a8d8a8",borderRadius:20,padding:"3px 10px",fontSize:11}}>📍 {plant.location}</span>}
      </div>
      {plant.notes && <div style={{background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"10px 14px",marginBottom:14,borderLeft:"3px solid #a8c5a0"}}><div style={{color:"#a8c5a0",fontSize:11,marginBottom:4}}>📝 MES NOTES</div><div style={{color:"#d4e8cc",fontSize:13}}>{plant.notes}</div></div>}
      <AIText prompt={prompt} deps={[plant.name]} />
    </Modal>
  );
}

function RappelsPlante({ plant, season }) {
  const prompt = `Pour ${plant.name}${plant.variety?" variété "+plant.variety:""}${plant.location?" à "+plant.location:""} en saison ${season}, génère 4 rappels importants. JSON uniquement: [{"action":"texte","urgence":"haute|moyenne|basse","emoji":"🌿"},...]`;
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    callAI(prompt, t => {
      try { setItems(JSON.parse(t.replace(/```json|```/g,"").trim())); }
      catch { setItems([{action:"Vérifier l'arrosage",urgence:"moyenne",emoji:"💧"}]); }
      setLoading(false);
    });
  }, [plant.name]);
  const col = { haute:"#ff6b6b", moyenne:"#ffd700", basse:"#a8d8a8" };
  if (loading) return React.createElement(Spinner);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {items.map((r,i) => (
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 12px",borderLeft:`3px solid ${col[r.urgence]||"#a8c5a0"}`}}>
          <span style={{fontSize:16}}>{r.emoji}</span>
          <span style={{color:"#d4e8cc",fontSize:13,flex:1}}>{r.action}</span>
          <span style={{fontSize:10,color:col[r.urgence],textTransform:"uppercase",fontWeight:700}}>{r.urgence}</span>
        </div>
      ))}
    </div>
  );
}

function AddEditModal({ initial, onSave, onClose }) {
  const blank = { name:"", emoji:"🌿", type:"potager", watering:2, light:"Plein soleil", npk:"5-5-5", seeds:"", lunar:"Fruit", latinName:"", variety:"", plantedDate:"", location:"", notes:"" };
  const [f, setF] = useState(initial || blank);
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,overflowY:"auto",display:"flex",justifyContent:"center",padding:"12px 14px 48px"}}>
      <div style={{background:"#1a2e1e",border:"1px solid rgba(168,197,160,0.2)",borderRadius:20,padding:22,maxWidth:440,width:"100%",marginTop:6}}>
        <h3 style={{color:"#f0ece0",marginBottom:18,fontSize:17}}>{initial?"✏️ Modifier":"➕ Nouvelle plante"}</h3>

        <div style={{color:"#ffd700",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>🌱 Base</div>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <div style={{flex:"0 0 64px"}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Emoji</div><input value={f.emoji} onChange={e=>s("emoji",e.target.value)} style={{...inp,textAlign:"center",fontSize:22,width:64}} /></div>
          <div style={{flex:1}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Nom *</div><input value={f.name} onChange={e=>s("name",e.target.value)} placeholder="Ex: Tomate" style={inp} /></div>
        </div>

        <div style={{color:"#ffd700",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10,marginTop:14}}>🔬 Botanique</div>
        <div style={{marginBottom:10}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Nom latin</div><input value={f.latinName} onChange={e=>s("latinName",e.target.value)} placeholder="Ex: Solanum lycopersicum" style={{...inp,fontStyle:"italic"}} /></div>
        <div style={{marginBottom:10}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Variété</div><input value={f.variety} onChange={e=>s("variety",e.target.value)} placeholder="Ex: Cœur de bœuf" style={inp} /></div>

        <div style={{color:"#ffd700",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10,marginTop:14}}>📍 Mon jardin</div>
        <div style={{marginBottom:10}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Date de plantation</div><input type="date" value={f.plantedDate} onChange={e=>s("plantedDate",e.target.value)} style={inp} /></div>
        <div style={{marginBottom:10}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Emplacement</div><input value={f.location} onChange={e=>s("location",e.target.value)} placeholder="Ex: Carré n°2, terrasse…" style={inp} /></div>
        <div style={{marginBottom:12}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Notes personnelles</div><textarea value={f.notes} onChange={e=>s("notes",e.target.value)} placeholder="Observations, traitements…" rows={3} style={{...inp,resize:"vertical",display:"block"}} /></div>

        <div style={{color:"#ffd700",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10,marginTop:4}}>⚙️ Culture</div>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div style={{flex:1}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Type</div>
            <select value={f.type} onChange={e=>s("type",e.target.value)} style={{...inp,background:"#1a2e1e"}}>
              {["potager","aromatique","ornement","intérieur","fruitier","bulbe"].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{flex:1}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>NPK</div><input value={f.npk} onChange={e=>s("npk",e.target.value)} placeholder="5-10-10" style={inp} /></div>
        </div>
        <div style={{marginBottom:10}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Lumière</div><input value={f.light} onChange={e=>s("light",e.target.value)} placeholder="Plein soleil…" style={inp} /></div>
        <div style={{marginBottom:16}}><div style={{color:"#a8c5a0",fontSize:12,marginBottom:4}}>Arrosage : {"💧".repeat(f.watering)}</div><input type="range" min={1} max={5} value={f.watering} onChange={e=>s("watering",+e.target.value)} style={{width:"100%",accentColor:"#2D6A4F"}} /></div>

        {!initial && <>
          <div style={{color:"#a8c5a0",fontSize:12,marginBottom:8}}>Préréglages rapides :</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
            {PRESETS.map(p=><button key={p.name} onClick={()=>setF({...p})} style={{background:"rgba(45,106,79,0.3)",border:"1px solid rgba(168,197,160,0.2)",borderRadius:20,padding:"4px 10px",color:"#d4e8cc",cursor:"pointer",fontSize:12}}>{p.emoji} {p.name}</button>)}
          </div>
        </>}

        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:11,background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontSize:14}}>Annuler</button>
          <button onClick={()=>{if(f.name.trim()){onSave(f);onClose();}}} style={{flex:1,padding:11,background:"#2D6A4F",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>Enregistrer 🌱</button>
        </div>
      </div>
    </div>
  );
}

function PlantCard({ plant, selected, onClick }) {
  return (
    <div onClick={onClick} style={{background:selected?"rgba(45,106,79,0.22)":"rgba(255,255,255,0.05)",border:`1px solid ${selected?"rgba(45,106,79,0.55)":"rgba(255,255,255,0.1)"}`,borderRadius:16,padding:14,cursor:"pointer"}}>
      <div style={{fontSize:30,marginBottom:6}}>{plant.emoji}</div>
      <div style={{fontWeight:700,color:"#f0ece0",fontSize:14,marginBottom:2}}>{plant.name}</div>
      {plant.variety && <div style={{fontSize:11,color:"#6b9a7a",marginBottom:2}}>{plant.variety}</div>}
      {plant.latinName && <div style={{fontSize:10,color:"#6b9a7a",fontStyle:"italic",marginBottom:4}}>{plant.latinName}</div>}
      <div style={{fontSize:10,color:"#a8c5a0",textTransform:"uppercase",marginBottom:8}}>{plant.type}</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        <span style={{background:"rgba(45,106,79,0.4)",color:"#a8d8a8",borderRadius:20,padding:"2px 7px",fontSize:10}}>{"💧".repeat(plant.watering)}</span>
        {plant.location && <span style={{background:"rgba(255,255,255,0.07)",color:"#a8c5a0",borderRadius:20,padding:"2px 7px",fontSize:10}}>📍 {plant.location}</span>}
      </div>
    </div>
  );
}

const MODULES = ["🌱 Plantes","🧺 Récolte","🔬 Maladies","⚗️ NPK","🌕 Lunaire"];

function App() {
  const [tab, setTab] = useState(0);
  const [plants, setPlants] = useState([
    {...PRESETS[0], id:1, variety:"Cœur de bœuf", plantedDate:"2025-04-10", location:"Carré n°1", notes:"Tuteurer en juin."},
    {...PRESETS[1], id:2, plantedDate:"2025-04-15", location:"Terrasse"},
    {...PRESETS[2], id:3, variety:"Albertine", location:"Mur sud"},
    {...PRESETS[6], id:4, variety:"Gariguette", location:"Carré n°3"},
  ]);
  const [sel, setSel] = useState(null);
  const [fiche, setFiche] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [harvestPlant, setHarvestPlant] = useState(null);
  const [tip, setTip] = useState(""); const [loadingTip, setLoadingTip] = useState(false);
  const season = getSeason();
  const seasonInfo = SEASONS[season];
  const moon = MOON[Math.floor((Date.now()/86400000) % 8)];

  const fetchTip = () => {
    setLoadingTip(true);
    callAI(`Conseil jardinage poétique et pratique pour la saison ${season} en France. Max 3 phrases, commence directement.`, t=>{setTip(t);setLoadingTip(false);});
  };
  useEffect(()=>fetchTip(),[]);

  const addPlant = p => setPlants(prev=>[...prev,{...p,id:Date.now()}]);
  const updPlant = p => { setPlants(prev=>prev.map(x=>x.id===p.id?{...p}:x)); setSel({...p}); };
  const delPlant = id => { setPlants(prev=>prev.filter(x=>x.id!==id)); setSel(null); };

  const card = {background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:18,marginBottom:14};

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a1a0e,#0d1f12,#081510)",fontFamily:"sans-serif",color:"#d4e8cc"}}>

      {/* HEADER */}
      <div style={{padding:"22px 18px 14px",borderBottom:"1px solid rgba(168,197,160,0.1)"}}>
        <h1 style={{fontSize:22,margin:0,color:"#f0ece0",fontWeight:900}}>{seasonInfo?.emoji} Mon Jardin IA</h1>
        <div style={{color:"#a8c5a0",fontSize:12,marginTop:3}}>{season} • {moon} • {plants.length} plante{plants.length>1?"s":""}</div>
        <div style={{marginTop:12,background:"rgba(45,106,79,0.18)",border:"1px solid rgba(45,106,79,0.35)",borderRadius:12,padding:"10px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <span style={{fontSize:11,color:"#a8d8a8",textTransform:"uppercase",letterSpacing:1}}>✨ Conseil IA du jour</span>
            <button onClick={fetchTip} style={{background:"none",border:"none",color:"#a8c5a0",cursor:"pointer",fontSize:15}}>↻</button>
          </div>
          {loadingTip ? <div style={{color:"#a8c5a0",fontSize:13}}>Génération…</div> : <div style={{color:"#d4e8cc",fontSize:13,lineHeight:1.6}}>{tip}</div>}
        </div>
      </div>

      {/* NAV */}
      <div style={{display:"flex",gap:6,padding:"10px 14px",overflowX:"auto",borderBottom:"1px solid rgba(168,197,160,0.08)"}}>
        {MODULES.map((m,i)=><button key={m} onClick={()=>setTab(i)} style={{padding:"8px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:tab===i?700:400,whiteSpace:"nowrap",background:tab===i?"#2D6A4F":"rgba(255,255,255,0.06)",color:tab===i?"#fff":"#a8c5a0"}}>{m}</button>)}
      </div>

      <div style={{padding:18}}>

        {/* PLANTES */}
        {tab===0 && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{fontSize:18,color:"#f0ece0",margin:0}}>🌱 Mes Plantes</h2>
            <button onClick={()=>setShowAdd(true)} style={{background:"#2D6A4F",border:"none",borderRadius:20,padding:"7px 16px",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>+ Ajouter</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))",gap:10,marginBottom:18}}>
            {plants.map(p=><PlantCard key={p.id} plant={p} selected={sel?.id===p.id} onClick={()=>setSel(prev=>prev?.id===p.id?null:p)} />)}
          </div>
          {sel && <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <span style={{fontSize:22}}>{sel.emoji}</span>
                <span style={{fontSize:16,color:"#f0ece0",marginLeft:8,fontWeight:700}}>{sel.name}</span>
                {sel.variety && <div style={{color:"#6b9a7a",fontSize:12,marginTop:2}}>Variété : {sel.variety}</div>}
                {sel.latinName && <div style={{color:"#6b9a7a",fontSize:11,fontStyle:"italic"}}>{sel.latinName}</div>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setEditing(sel)} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:20,padding:"5px 10px",color:"#fff",cursor:"pointer"}}>✏️</button>
                <button onClick={()=>setFiche(true)} style={{background:"#2D6A4F",border:"none",borderRadius:20,padding:"5px 12px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Fiche IA 📋</button>
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {sel.plantedDate && <span style={{background:"rgba(255,200,0,0.12)",color:"#ffd700",borderRadius:20,padding:"3px 10px",fontSize:11}}>📅 {sel.plantedDate}</span>}
              {sel.location && <span style={{background:"rgba(45,106,79,0.25)",color:"#a8d8a8",borderRadius:20,padding:"3px 10px",fontSize:11}}>📍 {sel.location}</span>}
              <span style={{background:"rgba(255,255,255,0.07)",color:"#a8c5a0",borderRadius:20,padding:"3px 10px",fontSize:11}}>☀️ {sel.light}</span>
            </div>
            {sel.notes && <div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 14px",marginBottom:12,borderLeft:"3px solid #a8c5a0"}}><div style={{color:"#a8c5a0",fontSize:11,marginBottom:4}}>📝 MES NOTES</div><div style={{color:"#d4e8cc",fontSize:13,lineHeight:1.6}}>{sel.notes}</div></div>}
            <div style={{color:"#a8c5a0",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>🔔 Rappels IA – {season}</div>
            <RappelsPlante plant={sel} season={season} />
            <button onClick={()=>delPlant(sel.id)} style={{marginTop:14,background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.2)",borderRadius:10,padding:"7px 14px",color:"#ff9999",cursor:"pointer",fontSize:12,width:"100%"}}>🗑️ Supprimer</button>
          </div>}
          {!sel && plants.length>0 && <div style={{...card,textAlign:"center",color:"#a8c5a0",fontSize:14}}>👆 Appuie sur une plante pour la gérer</div>}
        </>}

        {/* RÉCOLTE */}
        {tab===1 && <>
          <h2 style={{fontSize:18,color:"#f0ece0",margin:"0 0 14px"}}>🧺 Guide Récolte</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:18}}>
            {plants.map(p=>(
              <div key={p.id} onClick={()=>setHarvestPlant(prev=>prev?.id===p.id?null:p)} style={{background:harvestPlant?.id===p.id?"rgba(45,106,79,0.25)":"rgba(255,255,255,0.05)",border:`1px solid ${harvestPlant?.id===p.id?"rgba(45,106,79,0.55)":"rgba(255,255,255,0.1)"}`,borderRadius:16,padding:14,cursor:"pointer"}}>
                <div style={{fontSize:28,marginBottom:6}}>{p.emoji}</div>
                <div style={{fontWeight:700,color:"#f0ece0",fontSize:14}}>{p.name}</div>
                {p.variety && <div style={{fontSize:11,color:"#6b9a7a"}}>{p.variety}</div>}
                <div style={{fontSize:10,color:"#a8c5a0",textTransform:"uppercase",marginTop:4}}>{p.type}</div>
              </div>
            ))}
          </div>
          {harvestPlant && <div style={card}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <span style={{fontSize:24}}>{harvestPlant.emoji}</span>
              <div><div style={{color:"#f0ece0",fontSize:16,fontWeight:700}}>{harvestPlant.name}</div>{harvestPlant.variety&&<div style={{color:"#6b9a7a",fontSize:12}}>{harvestPlant.variety}</div>}</div>
            </div>
            <AIText prompt={`Expert jardinier. Pour ${harvestPlant.name}${harvestPlant.latinName?" ("+harvestPlant.latinName+")":""}${harvestPlant.variety?", variété "+harvestPlant.variety:""}, explique:\n1. 🗓️ Quand récolter (signes de maturité)\n2. ✂️ Comment récolter (gestes, outils)\n3. 🫘 Graines/Bulbes à récupérer\n4. 📦 Conservation\n5. 💡 Astuce\nMax 200 mots, français, pratique.`} deps={[harvestPlant.name]} />
          </div>}
          <div style={card}>
            <div style={{fontWeight:700,color:"#ffd700",marginBottom:12}}>📋 Référence rapide</div>
            {[{t:"🍅 Légumes-fruits",c:"Récolter à maturité colorée. Conserver à température ambiante."},{t:"🥬 Légumes-feuilles",c:"Couper feuilles extérieures, laisser le cœur. Conserver au frais."},{t:"🌸 Fleurs",c:"Cueillir avant pleine floraison pour séchage. Boutures en automne."},{t:"🫘 Graines & Bulbes",c:"Attendre maturité complète. Sécher 2-4 semaines. Étiqueter."},{t:"🍓 Fruits",c:"Cave pour pommes/poires. Congélation pour petits fruits."}].map((r,i)=>(
              <div key={i} style={{marginBottom:10,paddingBottom:10,borderBottom:i<4?"1px solid rgba(255,255,255,0.05)":"none"}}>
                <div style={{color:"#d4e8cc",fontWeight:700,fontSize:13,marginBottom:3}}>{r.t}</div>
                <div style={{color:"#a8c5a0",fontSize:12,lineHeight:1.5}}>{r.c}</div>
              </div>
            ))}
          </div>
        </>}

        {/* MALADIES */}
        {tab===2 && <>
          <h2 style={{fontSize:18,color:"#f0ece0",margin:"0 0 14px"}}>🔬 Maladies & Traitements</h2>
          {Object.entries(MALADIES).map(([d,i])=>(
            <div key={d} style={card}>
              <div style={{fontSize:15,color:"#f0ece0",fontWeight:700,marginBottom:8}}>🦠 {d}</div>
              <div style={{fontSize:12,color:"#ff9999",marginBottom:6}}>⚠️ {i.cause}</div>
              <div style={{fontSize:13,color:"#a8d8a8",marginBottom:4}}>💊 {i.traitement}</div>
              <div style={{fontSize:12,color:"#a8c5a0"}}>🛡️ {i.prevention}</div>
            </div>
          ))}
        </>}

        {/* NPK */}
        {tab===3 && <>
          <h2 style={{fontSize:18,color:"#f0ece0",margin:"0 0 14px"}}>⚗️ Engrais NPK</h2>
          {NPK.map((n,i)=>(
            <div key={i} style={{...card,borderLeft:`4px solid ${n.color}`}}>
              <div style={{fontSize:15,color:"#f0ece0",fontWeight:700,marginBottom:8}}>{n.titre}</div>
              <div style={{fontSize:13,color:"#a8c5a0",marginBottom:4}}>🌱 {n.plantes}</div>
              <div style={{fontSize:13,color:"#a8d8a8"}}>🌿 {n.naturel}</div>
            </div>
          ))}
          <div style={card}>
            <div style={{fontWeight:700,color:"#f0ece0",marginBottom:12}}>📊 Mes plantes</div>
            {plants.map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <span style={{fontSize:14}}>{p.emoji} {p.name}{p.variety?` (${p.variety})`:""}</span>
                <span style={{background:"rgba(45,106,79,0.3)",borderRadius:10,padding:"2px 8px",fontSize:12,color:"#a8d8a8"}}>NPK {p.npk}</span>
              </div>
            ))}
          </div>
        </>}

        {/* LUNAIRE */}
        {tab===4 && <>
          <h2 style={{fontSize:18,color:"#f0ece0",margin:"0 0 14px"}}>🌕 Calendrier Lunaire</h2>
          <div style={{...card,textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:40,marginBottom:8}}>{moon.split(" ")[0]}</div>
            <div style={{color:"#f0ece0",fontSize:17,fontWeight:700}}>{moon.split(" ").slice(1).join(" ")}</div>
            <div style={{color:"#a8c5a0",fontSize:12,marginTop:6}}>Phase lunaire du jour</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {LUNAR.map(l=>(
              <div key={l.jour} style={{...card,borderTop:`3px solid ${l.color}`,padding:14,marginBottom:0}}>
                <div style={{fontSize:22,marginBottom:4}}>{l.icon}</div>
                <div style={{fontWeight:700,color:"#f0ece0",marginBottom:4}}>Jour {l.jour}</div>
                <div style={{fontSize:11,color:"#a8c5a0",lineHeight:1.5}}>{l.desc}</div>
              </div>
            ))}
          </div>
          <div style={card}>
            <div style={{fontWeight:700,color:"#f0ece0",marginBottom:12}}>🌱 Mes plantes</div>
            {plants.map(p=>(
              <div key={p.id} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                <span>{p.emoji} {p.name}{p.variety?` (${p.variety})`:""}</span>
                <span style={{color:"#ffd700"}}>🌕 {p.lunar}</span>
              </div>
            ))}
          </div>
        </>}

      </div>

      {/* MODALS */}
      {fiche && sel && <FichePlante plant={sel} season={season} onClose={()=>setFiche(false)} />}
      {showAdd && <AddEditModal onSave={addPlant} onClose={()=>setShowAdd(false)} />}
      {editing && <AddEditModal initial={editing} onSave={p=>updPlant({...p,id:editing.id})} onClose={()=>setEditing(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
EOF
echo "done - $(wc -l < /mnt/user-data/outputs/index.html) lignes"
